name: Build Dominex Arena APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-apk.yml'
      - 'android/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Verify Android SDK & create local.properties
        run: |
          echo "=== Pre-installed SDK ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls "$ANDROID_HOME" && echo "SDK EXISTS" || echo "SDK NOT FOUND"
          ls "$ANDROID_HOME/build-tools/" 2>/dev/null || echo "no build-tools"
          ls "$ANDROID_HOME/platforms/" 2>/dev/null || echo "no platforms"

          # Find sdkmanager and install needed components
          SDKMAN=$(find "$ANDROID_HOME" -name sdkmanager -type f 2>/dev/null | head -1)
          echo "sdkmanager: $SDKMAN"
          if [ -n "$SDKMAN" ]; then
            yes | "$SDKMAN" --licenses > /dev/null 2>&1 || true
            "$SDKMAN" "platforms;android-34" "build-tools;33.0.2" 2>&1 | grep -v "^\[" | tail -5 || true
          fi

          echo "=== After install ==="
          ls "$ANDROID_HOME/platforms/" 2>/dev/null
          ls "$ANDROID_HOME/build-tools/" 2>/dev/null

          # Write SDK path to local.properties
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "local.properties: $(cat android/local.properties)"

      - name: Download Gradle 7.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6-bin.zip -O /tmp/g.zip
          unzip -q /tmp/g.zip -d /opt/
          chmod +x /opt/gradle-7.6/bin/gradle
          echo "Gradle: $(/opt/gradle-7.6/bin/gradle --version | head -1)"
          echo "/opt/gradle-7.6/bin" >> $GITHUB_PATH

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore $HOME/dom.ks -alias dom \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -dname "CN=Dominex,O=Dominex,C=IN" \
            -storepass Dom2026 -keypass Dom2026 2>/dev/null

      - name: Build Release APK
        working-directory: android
        run: |
          echo "=== Build Info ==="
          gradle --version | head -1
          echo "SDK: $ANDROID_HOME"
          echo "local.properties: $(cat local.properties)"
          echo "=== Building ==="
          gradle assembleRelease --no-daemon -x lint --stacktrace 2>&1 | tee /tmp/build.log
          # Propagate gradle exit code
          exit ${PIPESTATUS[0]}

      - name: Show build error
        if: failure()
        run: |
          echo "=== LAST 60 LINES OF BUILD LOG ==="
          tail -60 /tmp/build.log || echo "No build log"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/build.log
          if-no-files-found: ignore


      - name: Sign & package APK
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "Found: $APK ($(du -h $APK | cut -f1))"
          SIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort | tail -1)
          echo "Signer: $SIGNER"
          "$SIGNER" sign \
            --ks $HOME/dom.ks --ks-key-alias dom \
            --ks-pass pass:Dom2026 --key-pass pass:Dom2026 \
            --out public/dominex-arena.apk "$APK"
          ls -lh public/dominex-arena.apk

      - name: Commit APK to repo
        run: |
          git config user.email "ci@dominex.app"
          git config user.name "CI Bot"
          git add public/dominex-arena.apk
          git diff --staged --quiet || git commit -m "ci: APK v2.1 [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: dominex-arena-apk
          path: public/dominex-arena.apk
          if-no-files-found: error