name: Build Dominex Arena APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-apk.yml'
      - 'android/**'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK & install components
        run: |
          # Android SDK is pre-installed on macos runner
          echo "ANDROID_HOME=$ANDROID_HOME"
          # Add cmdline-tools to PATH
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin:$PATH"
          # Use full path since sdkmanager may not be in default PATH
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_HOME/tools/bin/sdkmanager"
          fi
          echo "Using sdkmanager: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" "build-tools;33.0.2" "platforms;android-34" || true
          ls "$ANDROID_HOME/build-tools/" || true

      - name: Install SDK components
        run: echo "SDK setup done"

      - name: Create local.properties
        working-directory: android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore dominex.keystore -alias dominex \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -dname "CN=Dominex,OU=Game,O=Dominex,L=IN,S=IN,C=IN" \
            -storepass DominexGame2026 -keypass DominexGame2026 2>/dev/null || true

      - name: Build Release APK
        working-directory: android
        run: |
          # Download Gradle 7.6 directly (avoid macOS system gradle version issues)
          wget -q https://services.gradle.org/distributions/gradle-7.6-bin.zip -O /tmp/gradle76.zip
          unzip -q /tmp/gradle76.zip -d /tmp/
          GRADLE=/tmp/gradle-7.6/bin/gradle
          chmod +x "$GRADLE"
          
          # Set SDK paths
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          echo "Gradle: $($GRADLE --version | head -1)"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "local.properties: $(cat local.properties)"
          
          # Build with full stacktrace for debugging
          "$GRADLE" assembleRelease --no-daemon -x lint --stacktrace 2>&1 | tail -80


      - name: Sign APK
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "Found: $APK"
          SIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" | sort | tail -1)
          "$SIGNER" sign \
            --ks dominex.keystore --ks-key-alias dominex \
            --ks-pass pass:DominexGame2026 --key-pass pass:DominexGame2026 \
            --out public/dominex-arena.apk "$APK"
          ls -lh public/dominex-arena.apk

      - name: Commit signed APK
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add public/dominex-arena.apk
          git diff --staged --quiet || git commit -m "ci: APK v2.1 signed [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dominex-arena-apk
          path: public/dominex-arena.apk
          if-no-files-found: error