name: Build Dominex Arena APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-apk.yml'
      - 'android/**'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Show Android SDK location
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/build-tools/ || echo "no build-tools"
          ls $ANDROID_HOME/platforms/ || echo "no platforms"

      - name: Install SDK components
        run: |
          sdkmanager "build-tools;33.0.2" "platforms;android-34"

      - name: Create local.properties
        working-directory: android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore dominex.keystore -alias dominex \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -dname "CN=Dominex,OU=Game,O=Dominex,L=IN,S=IN,C=IN" \
            -storepass DominexGame2026 -keypass DominexGame2026 2>/dev/null || true

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x ../gradlew 2>/dev/null || true
          # Use gradle wrapper if available, else system gradle
          if command -v gradle &> /dev/null; then
            gradle assembleRelease --no-daemon -x lint
          else
            brew install gradle
            gradle assembleRelease --no-daemon -x lint
          fi

      - name: Sign APK
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "Found: $APK"
          SIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" | sort | tail -1)
          "$SIGNER" sign \
            --ks dominex.keystore --ks-key-alias dominex \
            --ks-pass pass:DominexGame2026 --key-pass pass:DominexGame2026 \
            --out public/dominex-arena.apk "$APK"
          ls -lh public/dominex-arena.apk

      - name: Commit signed APK
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add public/dominex-arena.apk
          git diff --staged --quiet || git commit -m "ci: APK v2.1 signed [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dominex-arena-apk
          path: public/dominex-arena.apk
          if-no-files-found: error