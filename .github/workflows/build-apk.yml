name: Build Dominex Arena APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-apk.yml'
      - 'android/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: yes | sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore dominex.keystore -alias dominex \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -dname "CN=Dominex Arena,OU=Game,O=Dominex,L=IN,S=IN,C=IN" \
            -storepass DominexGame2026 -keypass DominexGame2026 2>/dev/null
          FP=$(keytool -list -v -keystore dominex.keystore -alias dominex \
            -storepass DominexGame2026 2>/dev/null | grep "SHA256:" | sed 's/.*SHA256: //')
          echo "SHA256=$FP"
          mkdir -p public/.well-known
          printf '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"com.dominex.arena","sha256_cert_fingerprints":["%s"]}}]' "$FP" > public/.well-known/assetlinks.json

      - name: Build APK
        working-directory: android
        run: gradle assembleRelease --no-daemon -x lint

      - name: Sign APK
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "Signing: $APK"
          "$ANDROID_HOME/build-tools/34.0.0/apksigner" sign \
            --ks dominex.keystore --ks-key-alias dominex \
            --ks-pass pass:DominexGame2026 --key-pass pass:DominexGame2026 \
            --out public/dominex-arena.apk "$APK"
          ls -lh public/dominex-arena.apk

      - name: Commit artifacts
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add public/dominex-arena.apk public/.well-known/assetlinks.json
          git diff --staged --quiet || git commit -m "ci: build WebView game APK [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dominex-arena-apk
          path: public/dominex-arena.apk
          if-no-files-found: error