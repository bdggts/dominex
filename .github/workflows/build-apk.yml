name: Build Dominex Arena APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-apk.yml'
      - 'android/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK from scratch
        run: |
          # Download latest cmdline-tools
          CMDTOOLS="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q "$CMDTOOLS" -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools_extracted
          mv /tmp/cmdtools_extracted/cmdline-tools $HOME/android-sdk/cmdline-tools/latest

          # Set ANDROID_HOME for subsequent steps
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

          # Accept licenses + install
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk --licenses > /dev/null 2>&1 || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk \
            "platforms;android-34" \
            "build-tools;33.0.2" \
            "platform-tools"

          echo "SDK installed at $HOME/android-sdk"
          ls $HOME/android-sdk/platforms/
          ls $HOME/android-sdk/build-tools/

      - name: Download Gradle 7.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-7.6/bin" >> $GITHUB_PATH
          echo "Gradle ready: $(/opt/gradle-7.6/bin/gradle --version | head -1)"

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore $HOME/dominex.keystore -alias dominex \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -dname "CN=Dominex,OU=Game,O=Dominex,L=IN,S=IN,C=IN" \
            -storepass DominexGame2026 -keypass DominexGame2026 2>/dev/null

      - name: Build Release APK
        working-directory: android
        run: |
          # Write SDK path
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties

          # Verify gradle is available
          gradle --version | head -1

          # Build (--info for verbose output)
          gradle assembleRelease --no-daemon -x lint --no-configuration-cache 2>&1

      - name: Find & sign APK
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" 2>/dev/null | head -1)
          echo "Found APK: $APK"
          ls -lh "$APK"

          SIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" | sort | tail -1)
          echo "Signer: $SIGNER"
          "$SIGNER" sign \
            --ks $HOME/dominex.keystore --ks-key-alias dominex \
            --ks-pass pass:DominexGame2026 --key-pass pass:DominexGame2026 \
            --out public/dominex-arena.apk "$APK"
          ls -lh public/dominex-arena.apk

      - name: Commit signed APK
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add public/dominex-arena.apk
          git diff --staged --quiet || git commit -m "ci: APK v2.1 [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dominex-arena-apk
          path: public/dominex-arena.apk
          if-no-files-found: error