name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/build-apk.yml']

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build TWA APK
        run: |
          mkdir -p apk-build && cd apk-build
          # Non-interactive init using echo to answer prompts
          echo -e 'n\n' | bubblewrap init \
            --manifest="https://dominex-three.vercel.app/manifest.json" \
            || true
          # Build with no validation
          echo -e '\n\n\n\n\n\n\n\n' | bubblewrap build --skipPwaValidation || true
          ls -la

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dominex-arena-apk
          path: |
            apk-build/app-release-signed.apk
            apk-build/*.apk
          if-no-files-found: warn
